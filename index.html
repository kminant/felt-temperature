<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기상청 여름철 체감온도 계산기</title>

<style>
    body{
        font-family: 'Pretendard', sans-serif;
        background:#eef4ff;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        margin:0;
    }

    .container{
        background:white;
        padding:30px;
        border-radius:20px;
        box-shadow:0 4px 15px rgba(0,0,0,0.1);
        width:320px;
    }

    h1{
        text-align:center;
        font-size:24px;
        margin-bottom:25px;
        color:#222;
    }

    label{
        display:block;
        margin-top:15px;
        margin-bottom:5px;
        font-weight:bold;
    }

    input{
        width:100%;
        padding:12px;
        border:1px solid #ccc;
        border-radius:10px;
        font-size:16px;
        box-sizing:border-box;
    }

    button{
        width:100%;
        margin-top:25px;
        padding:14px;
        border:none;
        border-radius:12px;
        background:#0078ff;
        color:white;
        font-size:17px;
        font-weight:bold;
        cursor:pointer;
    }

    button:hover{
        background:#005fcc;
    }

    .result{
        margin-top:25px;
        text-align:center;
        font-size:26px;
        font-weight:bold;
    }

    .level{
        margin-top:10px;
        text-align:center;
        font-size:18px;
        font-weight:bold;
    }
</style>
</head>

<body>

<div class="container">

    <h1>여름철 체감온도 계산기</h1>

    <label for="temp">기온 (℃)</label>
    <input type="number" id="temp" placeholder="예: 25.4">

    <label for="humidity">습도 (%)</label>
    <input type="number" id="humidity" placeholder="예: 72.8">

    <button onclick="calculateHeatIndex()">체감온도 계산</button>

    <div class="result" id="result"></div>
    <div class="level" id="level"></div>

<!-- 체감온도 설명 -->
    <div style="
        margin-top:30px;
        padding:20px;
        background:#f7f9fc;
        border-radius:15px;
        line-height:1.7;
        color:#333;
        font-size:15px;
    ">

        <h3 style="
            margin-top:0;
            color:#0078ff;
            font-size:20px;
        ">
            체감온도란?
        </h3>

        <p>
            체감온도는 사람이 실제로 느끼는 더위를 수치로 나타낸 값입니다.
            같은 기온이라도 습도가 높으면 땀이 잘 증발하지 않아 더 덥게 느껴지며,
            반대로 바람이 불면 비교적 시원하게 느껴질 수 있습니다.
        </p>

        <p>
            기상청은 기온과 상대습도를 이용하여 여름철 체감온도를 산출하고 있으며,
            폭염으로 인한 건강 피해를 예방하기 위한 참고자료로 활용하고 있습니다.
        </p>

        <div style="
            margin-top:15px;
            padding:15px;
            background:white;
            border-left:5px solid #ff6b00;
            border-radius:10px;
        ">
            ☀️ <strong>폭염 시 행동요령</strong><br>
            물을 자주 마시고,
            가장 더운 오후 시간대에는 야외활동을 줄이며,
            충분한 휴식을 취하세요.
        </div>

</div>

</div>

<script>

function calculateHeatIndex(){

    const Ta = parseFloat(document.getElementById("temp").value);
    const RH = parseFloat(document.getElementById("humidity").value);

    if(isNaN(Ta) || isNaN(RH)){
        alert("기온과 습도를 입력해주세요.");
        return;
    }

    // 습구온도(Tw) 계산
    const Tw =
        Ta * Math.atan(0.151977 * Math.sqrt(RH + 8.313659))
        + Math.atan(Ta + RH)
        - Math.atan(RH - 1.67633)
        + 0.00391838 * Math.pow(RH, 1.5) * Math.atan(0.023101 * RH)
        - 4.686035;

    // 기상청 체감온도 계산식
    const HI =
        -0.2442
        + 0.55399 * Tw
        + 0.45535 * Ta
        - 0.0022 * Math.pow(Tw, 2)
        + 0.00278 * Tw * Ta
        + 3.0;

    const result = HI.toFixed(1);

    document.getElementById("result").innerHTML =
        result + " ℃";

    // 위험 단계 표시
    let levelText = "";

    if(HI < 31){
        levelText = "없음";
    }
    else if(HI < 33){
        levelText = "관심";
    }
    else if(HI < 35){
        levelText = "주의";
    }
    else if(HI < 38){
        levelText = "경고";
    }
    else{
        levelText = "위험";
    }

    document.getElementById("level").innerHTML =
        "폭염 단계 : " + levelText;
}

</script>

</body>
</html>
