<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기상청 여름철 체감온도 계산기</title>

<style>
    body{
        font-family: 'Pretendard', sans-serif;
        background:#eef4ff;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        margin:0;
    }

    .container{
        background:white;
        padding:30px;
        border-radius:20px;
        box-shadow:0 4px 15px rgba(0,0,0,0.1);
        width:320px;
    }

    h1{
        text-align:center;
        font-size:24px;
        margin-bottom:25px;
        color:#222;
    }

    label{
        display:block;
        margin-top:15px;
        margin-bottom:5px;
        font-weight:bold;
    }

    input{
        width:100%;
        padding:12px;
        border:1px solid #ccc;
        border-radius:10px;
        font-size:16px;
        box-sizing:border-box;
    }

    button{
        width:100%;
        margin-top:25px;
        padding:14px;
        border:none;
        border-radius:12px;
        background:#0078ff;
        color:white;
        font-size:17px;
        font-weight:bold;
        cursor:pointer;
    }

    button:hover{
        background:#005fcc;
    }

    .result{
        margin-top:25px;
        text-align:center;
        font-size:26px;
        font-weight:bold;
    }

    .level{
        margin-top:10px;
        text-align:center;
        font-size:18px;
        font-weight:bold;
    }
</style>
</head>

<body>

<div class="container">

    <h1>여름철 체감온도 계산기</h1>

    <label for="temp">기온 (℃)</label>
    <input type="number" id="temp" placeholder="예: 25.4">

    <label for="humidity">습도 (%)</label>
    <input type="number" id="humidity" placeholder="예: 72.8">

    <button onclick="calculateHeatIndex()">체감온도 계산</button>

    <div class="result" id="result"></div>
    <div class="level" id="level"></div>

</div>

<script>

function calculateHeatIndex(){

    const Ta = parseFloat(document.getElementById("temp").value);
    const RH = parseFloat(document.getElementById("humidity").value);

    if(isNaN(Ta) || isNaN(RH)){
        alert("기온과 습도를 입력해주세요.");
        return;
    }

    // 습구온도(Tw) 계산
    const Tw =
        Ta * Math.atan(0.151977 * Math.sqrt(RH + 8.313659))
        + Math.atan(Ta + RH)
        - Math.atan(RH - 1.67633)
        + 0.00391838 * Math.pow(RH, 1.5) * Math.atan(0.023101 * RH)
        - 4.686035;

    // 기상청 체감온도 계산식
    const HI =
        -0.2442
        + 0.55399 * Tw
        + 0.45535 * Ta
        - 0.0022 * Math.pow(Tw, 2)
        + 0.00278 * Tw * Ta
        + 3.0;

    const result = HI.toFixed(1);

    document.getElementById("result").innerHTML =
        result + " ℃";

    // 위험 단계 표시
    let levelText = "";

    if(HI < 31){
        levelText = "없음";
    }
    else if(HI < 33){
        levelText = "관심";
    }
    else if(HI < 35){
        levelText = "주의";
    }
    else if(HI < 38){
        levelText = "경고";
    }
    else{
        levelText = "위험";
    }

    document.getElementById("level").innerHTML =
        "폭염 단계 : " + levelText;
}

</script>

</body>
</html>
