<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기상청 여름철 체감온도 계산기</title>

<style>
    body{
        font-family: 'Pretendard', sans-serif;
        background:#eef4ff;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        margin:0;
    }

    .container{
        background:white;
        padding:30px;
        border-radius:20px;
        box-shadow:0 4px 15px rgba(0,0,0,0.1);
        width:320px;
    }

    h1{
        text-align:center;
        font-size:24px;
        margin-bottom:25px;
        color:#222;
    }

    label{
        display:block;
        margin-top:15px;
        margin-bottom:5px;
        font-weight:bold;
    }

    input{
        width:100%;
        padding:12px;
        border:1px solid #ccc;
        border-radius:10px;
        font-size:16px;
        box-sizing:border-box;
    }

    button{
        width:100%;
        margin-top:25px;
        padding:14px;
        border:none;
        border-radius:12px;
        background:#0078ff;
        color:white;
        font-size:17px;
        font-weight:bold;
        cursor:pointer;
    }

    button:hover{
        background:#005fcc;
    }

    .result{
        margin-top:25px;
        text-align:center;
        font-size:26px;
        font-weight:bold;
    }

    .level{
        margin-top:10px;
        text-align:center;
        font-size:18px;
        font-weight:bold;
    }
</style>
</head>

<body>

<div class="container">

    <h1>여름철 체감온도 계산기</h1>

    <label for="temp">기온 (℃)</label>
    <input type="number" id="temp" placeholder="예: 25.4">

    <label for="humidity">습도 (%)</label>
    <input type="number" id="humidity" placeholder="예: 72.8">

    <button onclick="calculateHeatIndex()">체감온도 계산</button>

    <div class="result" id="result"></div>
    <div class="level" id="level"></div>

<!-- 체감온도 설명 -->
    <div style="
        margin-top:30px;
        padding:20px;
        background:#f7f9fc;
        border-radius:15px;
        line-height:1.7;
        color:#333;
        font-size:15px;
    ">

        <h3 style="
            margin-top:0;
            color:#0078ff;
            font-size:20px;
        ">
            체감온도란?
        </h3>

        <p>
            기온에 상대습도의 영향이 더해져 사람이 느끼는 더위를 추정하여 산출한 온도로,
            습도 약 55%를 기준으로 습도가 10%p 증가 혹은 감소함에 따라
            체감하는 온도가 약 1℃ 증가 혹은 감소하는 특징이 있다.
        </p>

</div>

<!-- 접었다 펼치는 체감온도 산출식 -->
<details id="formulaBox"
    style="
    margin-top:20px;
    background:white;
    border-radius:15px;
    border:1px solid #dbe6ff;
    padding:15px;
">

    <summary style="
        cursor:pointer;
        font-size:20px;
        font-weight:bold;
        color:#0078ff;
        outline:none;
    ">
        체감온도 산출식 보기
    </summary>

    <div style="
        margin-top:20px;
        line-height:1.8;
        color:#333;
        font-size:15px;
    ">

        <!-- 내용 -->
        체감온도 공식 내용...

    </div>

</details>

<script>
const formulaBox = document.getElementById("formulaBox");

formulaBox.addEventListener("toggle", function() {

    if (formulaBox.open) {

        setTimeout(() => {
            formulaBox.scrollIntoView({
                behavior: "smooth",
                block: "start"
            });
        }, 100);

    }

});
</script>
    
</div>

<script>

function calculateHeatIndex(){

    const Ta = parseFloat(document.getElementById("temp").value);
    const RH = parseFloat(document.getElementById("humidity").value);

    if(isNaN(Ta) || isNaN(RH)){
        alert("기온과 습도를 입력해주세요.");
        return;
    }

    // 습구온도(Tw) 계산
    const Tw =
        Ta * Math.atan(0.151977 * Math.sqrt(RH + 8.313659))
        + Math.atan(Ta + RH)
        - Math.atan(RH - 1.67633)
        + 0.00391838 * Math.pow(RH, 1.5) * Math.atan(0.023101 * RH)
        - 4.686035;

    // 기상청 체감온도 계산식
    const HI =
        -0.2442
        + 0.55399 * Tw
        + 0.45535 * Ta
        - 0.0022 * Math.pow(Tw, 2)
        + 0.00278 * Tw * Ta
        + 3.0;

    const result = HI.toFixed(1);

    document.getElementById("result").innerHTML =
        result + " ℃";

}

</script>

</body>
</html>
