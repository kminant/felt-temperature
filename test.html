<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>체감온도 계산기</title>

  <style>
    body {
      font-family: sans-serif;
      max-width: 500px;
      margin: 50px auto;
      padding: 20px;
      line-height: 1.8;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      cursor: pointer;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      background: #f3f3f3;
      border-radius: 10px;
      font-size: 20px;
      text-align: center;
    }
  </style>
</head>
<body>

  <h1>체감온도 계산기</h1>

  <label>기온 (℃)</label>
  <input type="number" id="temp">

  <label>풍속 (m/s)</label>
  <input type="number" id="wind">

  <label>습도 (%)</label>
  <input type="number" id="humidity">

  <button onclick="calculate()">계산하기</button>

  <div class="result" id="result">
    결과가 여기에 표시됩니다.
  </div>

  <script>
    function calculate() {

      const T = parseFloat(document.getElementById("temp").value);
      const V = parseFloat(document.getElementById("wind").value);
      const H = parseFloat(document.getElementById("humidity").value);

      // 간단한 체감온도 예시 계산식
      // (교육용 예시)

      const felt =
        13.12 +
        0.6215 * T -
        11.37 * Math.pow(V * 3.6, 0.16) +
        0.3965 * T * Math.pow(V * 3.6, 0.16);

      document.getElementById("result").innerHTML =
        `체감온도는 <b>${felt.toFixed(1)}℃</b> 입니다.`;
    }
  </script>

</body>
</html>
